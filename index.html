    <link rel="shortcut icon" href="https://mocha-cdn.com/favicon.ico" type="image/x-icon" id="dynamic-favicon"/>
    <title>
      Isites Pro
    </title>
    <!-- Script para prevenir el parpadeo del Favicon y Título cargándolos desde la caché instantáneamente -->
    <script>
      try {
        var cachedSettings = localStorage.getItem('platform_settings_cache');
        if (cachedSettings) {
          var settings = JSON.parse(cachedSettings);
          if (settings.page_title) document.title = settings.page_title;
          if (settings.favicon_url) document.getElementById('dynamic-favicon').href = settings.favicon_url;
        }
      } catch(e) {}
    </script>

  <body>
    <div id="root">
    </div>
    <script type="module" src="/src/react-app/main.tsx">
    </script>
  </body>
